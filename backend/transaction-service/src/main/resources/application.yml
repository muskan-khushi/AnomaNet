server:
  port: 8081

spring:
  application:
    name: transaction-service
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5433/anomanet}
    username: ${POSTGRES_USER:anomanet}
    password: ${POSTGRES_PASSWORD:anomanet123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: false
  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USER:neo4j}
      password: ${NEO4J_PASSWORD:anomanet2024}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: transaction-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all

kafka:
  topics:
    raw-transactions: raw.transactions
    ml-scoring-queue: ml.scoring.queue
